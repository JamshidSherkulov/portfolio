spring:
  application:
    name: portfolio-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
    username: ${DATABASE_USERNAME:portfolio-user}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION}